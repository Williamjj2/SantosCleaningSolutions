[build]
  publish = "dist/public"
  command = "echo 'Pre-built site, no build step needed'"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Netlify Image CDN — enables on-the-fly resize, format conversion (WebP/AVIF),
# and quality optimization via /.netlify/images?url=...&w=...&q=...
# Remote allowlist required for any external image origins we may transform.
[images]
  remote_images = [
    "https://lh3.googleusercontent.com/.*",
    "https://ui-avatars.com/.*",
    "https://www.gstatic.com/.*"
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/sitemap-blog.xml"
  to = "/.netlify/functions/api/sitemap-blog.xml"
  status = 200

[[redirects]]
  from = "/rss.xml"
  to = "/.netlify/functions/api/rss.xml"
  status = 200

[[redirects]]
  from = "/feed.xml"
  to = "/.netlify/functions/api/feed.xml"
  status = 200

[[redirects]]
  from = "/guides/moving.html"
  to = "/move-in-out-cleaning/"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers — applied to every HTML response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://us-assets.i.posthog.com https://us.i.posthog.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://*.supabase.co https://us.i.posthog.com https://us-assets.i.posthog.com; frame-src 'self' https://www.google.com https://www.youtube.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
